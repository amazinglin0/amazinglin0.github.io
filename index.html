<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你是哪部世界名著里的神来之笔</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --paper-bg: #fdfaf2;
            --ink-black: #2c3e50;
            --accent-gold: #a67c52;
            --soft-border: rgba(166, 124, 82, 0.3);
        }

        body {
            font-family: "PingFang SC", "STSong", serif;
            background-color: #ebe4d8; /* 模拟桌台 */
            color: var(--ink-black);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--paper-bg);
            padding: 30px 20px;
            min-height: 85vh;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1), inset 0 0 100px rgba(166, 124, 82, 0.05);
            border: 1px solid var(--soft-border);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 首页层次化排版 */
        h1 { 
            text-align: center; 
            font-size: 1.6em; 
            letter-spacing: 4px; 
            color: var(--accent-gold);
            margin-bottom: 40px;
            border-bottom: 1px double var(--soft-border);
            padding-bottom: 15px;
        }

        .preface-content {
            font-size: 0.95em;
            line-height: 2;
            text-align: justify;
            color: #555;
        }

        .preface-content p { margin-bottom: 1.5em; text-indent: 2em; }
        .quote-mark { font-size: 2em; color: var(--soft-border); font-family: Georgia; line-height: 0; }

        /* 按钮样式优化 */
        .btn-group { margin-top: auto; display: flex; gap: 10px; }
        .nav-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--accent-gold);
            background: none;
            color: var(--accent-gold);
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.3s;
        }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .nav-btn.primary { background: var(--accent-gold); color: white; }

        .option-item {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: rgba(166, 124, 82, 0.03);
            border: 1px solid #eee;
            border-radius: 4px;
            text-align: left;
            font-size: 0.92em;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-item:active { background: var(--soft-border); }

        /* 结果页排版 */
        #result { display: none; text-align: center; }
        .res-book-title { font-size: 1.4em; font-weight: bold; margin: 20px 0 10px; color: #1a1a1a; }
        .res-tagline { color: var(--accent-gold); font-style: italic; font-size: 0.9em; margin-bottom: 25px; }
        
        #chart-container { width: 90%; margin: 0 auto; }
        
        .analysis-box {
            text-align: left;
            margin-top: 25px;
            padding: 20px;
            background: rgba(166, 124, 82, 0.05);
            border-top: 1px solid var(--soft-border);
        }
        .analysis-text { font-size: 0.9em; line-height: 1.8; color: #444; }
        .analysis-summary { 
            margin-top: 15px; 
            padding-top: 10px;
            border-top: 1px dashed var(--soft-border);
            font-weight: bold; 
            text-align: center;
            color: var(--accent-gold);
            letter-spacing: 2px;
        }

        .progress-num { text-align: right; font-size: 0.8em; color: var(--accent-gold); margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="intro">
        <h1>名著里的神来之笔</h1>
        <div class="preface-content">
            <span class="quote-mark">“</span>
            <p>每个人的人生，都是一部尚未完结的世界名著。在命运跌宕起伏的章节中，你或许是那段惊心动魄的转折，或许是那抹温柔宁静的底色。</p>
            <p>本测验将带你穿梭于文字的丛林，探索你灵魂深处与哪部传世经典产生了奇妙的共振。</p>
            <p>通过深度挖掘你的潜意识抉择、审美偏向与核心价值观，揭示你作为“神来之笔”在文学殿堂中独特而璀璨的定位。</p>
        </div>
        <div class="btn-group" style="margin-top: 40px;">
            <button class="nav-btn primary" onclick="startQuiz()">开启探索之旅</button>
        </div>
    </div>

    <div id="quiz-box" style="display:none; flex: 1; flex-direction: column;">
        <div class="progress-num" id="progress-text">1 / 20</div>
        <h3 id="question-text" style="font-size: 1.1em; margin-bottom: 20px;"></h3>
        <div id="options-list" style="flex: 1;"></div>
        
        <div class="btn-group">
            <button id="prev-btn" class="nav-btn" onclick="prevQuestion()">上一题</button>
            <button id="next-btn" class="nav-btn" onclick="nextQuestion()" disabled>下一题</button>
        </div>
    </div>

    <div id="result">
        <div class="res-book-title" id="res-book"></div>
        <div class="res-tagline" id="res-tag"></div>
        
        <div id="chart-container">
            <canvas id="radarChart"></canvas>
        </div>

        <div class="analysis-box">
            <div id="res-analysis-main" class="analysis-text"></div>
            <div id="res-summary" class="analysis-summary"></div>
        </div>
        
        <button class="nav-btn" style="margin-top: 20px; width: 100%;" onclick="location.reload()">重读此篇</button>
    </div>
</div>

<script>
// 此处保留之前的题目数据 (为了节省空间，我直接在逻辑中使用您之前的题目)
const questions = [

// 名著结果库 (同前)
const books = {
    "0000": { name: "《傲慢与偏见》", tag: "人性的洞察与理智的浪漫", analysis: "简·奥斯汀在琐碎日常中点石成金，其神来之笔在于用理智的锋芒刺破了阶级与偏见的迷雾，让尊严与爱情并行。你也是这种清醒的存在，在复杂的人际网中总能一眼识破伪装，保持优雅的克制。你与作品的奥妙在于，你不仅是生活的观察者，更是规则的重塑者，总能平衡感性与理性。", summary: "理智与情感的平衡大师" },
    "0001": { name: "《1984》", tag: "冷峻的警示与真相的坚守", analysis: "这部作品最惊心动魄处在于它对权力与自由的极致拆解，那只‘老大哥’的眼睛成为了文学史上永恒的战栗。你拥有一种近乎残酷的清醒，能从喧嚣中分辨真相的低语。你与这种底色的共鸣在于，你从不盲从，在思想的荒原中孤独地看守火种。", summary: "清醒且坚毅的真相守护者" },

    "0101": { name: "《追忆似水年华》", tag: "时间的流逝与感官的永恒", analysis: "一块浸在茶里的玛德莱娜小蛋糕，开启了普鲁斯特的时间之门，这便是感官重构记忆的神来之笔。你是一个极其细腻的感官捕手，总能从日常的微末中提取出永恒的情感。你与作品的联结在于，你生活在当下，更生活在对美好的重构中。", summary: "捕捉时间的感官艺术家" },

    "0111": { name: "《百年孤独》", tag: "宿命的循环与彻骨的荒凉", analysis: "布恩迪亚家族七代人的循环，在马孔多的风中消逝，其神来之笔在于将百年悲欢浓缩进一个永恒的孤独瞬间。你对生命有着深沉的宿命感，能穿透繁华看到底色里的荒凉。这种关系在于，你以一种慈悲而疏离的姿态，注视着命运的轮回。", summary: "俯瞰命运轮回的慈悲者" },

    "1100": { name: "《罪与罚》", tag: "灵魂的拷问、痛苦与救赎", analysis: "拉斯柯尔尼科夫内心的激烈交锋，是陀思妥耶夫斯基对人性善恶边界最深刻的涂抹。你极具道德感和同理心，对自我的精神纯洁有着近乎苛刻的要求。这种关系在于，你总是在自省中成长，在承担责任的过程中获得真正的自由。", summary: "在深渊边缘寻找光明的自省者" },

    "1110": { name: "《白鲸》", tag: "偏执的抗争与壮阔的自我毁灭", analysis: "亚哈船长那根象牙假腿踏在甲板上的声响，是对命运最强烈的挑战。你拥有着令人敬畏的意志力和专注度，一旦锚定目标便九死不悔。这种奥妙在于你这种近乎偏执的纯粹，赋予了生命一种悲剧性的崇高美感。", summary: "追逐终极理想的孤勇者" },
    "1111": { name: "《堂吉诃德》", tag: "伟大的疯癫与理想主义", analysis: "向风车冲锋的那个瘦削身影，是塞万提斯留给世界永恒的理想主义剪影。你是那个在功利时代依然相信童话和正义的人，你的“疯癫”是最高级的清醒。你与这部巨著的关系在于，你选择了一条布满荆棘但充满奇迹的梦幻之路。", summary: "永恒的梦幻骑士" }

let currentIdx = 0;
let userAnswers = new Array(questions.length).fill(null);

function startQuiz() {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('quiz-box').style.display = 'flex';
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentIdx];
    document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${questions.length}`;
    document.getElementById('question-text').innerText = q.q;
    
    const list = document.getElementById('options-list');
    list.innerHTML = '';
    q.a.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'option-item';
        if(userAnswers[currentIdx] === i) btn.style.borderColor = 'var(--accent-gold)';
        btn.innerText = opt;
        btn.onclick = () => selectOption(i);
        list.appendChild(btn);
    });

    document.getElementById('prev-btn').disabled = currentIdx === 0;
    document.getElementById('next-btn').disabled = userAnswers[currentIdx] === null;
}

function selectOption(i) {
    userAnswers[currentIdx] = i;
    renderQuestion();
    setTimeout(() => {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
        } else {
            showResult();
        }
    }, 300);
}

function prevQuestion() {
    if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
    }
}

function nextQuestion() {
    if (currentIdx < questions.length - 1) {
        currentIdx++;
        renderQuestion();
    }
}

function showResult() {
    document.getElementById('quiz-box').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    // 算法逻辑
    let dim = { X: 0, Y: 0, Z: 0, W: 0 };
    userAnswers.forEach((ans, i) => {
        const d = ["X", "Y", "Z", "W"][i % 4];
        if (ans === 1 || ans === 2) dim[d]++;
    });

    const binary = (dim.X >= 3 ? "1" : "0") + (dim.Y >= 3 ? "1" : "0") + (dim.Z >= 3 ? "1" : "0") + (dim.W >= 3 ? "1" : "0");
    const res = books[binary] || books["0000"];

    document.getElementById('res-book').innerText = `你是${res.name}部世界名著里的神来之笔`;
    document.getElementById('res-tag').innerText = res.tag;
    document.getElementById('res-analysis-main').innerText = res.analysis;
    document.getElementById('res-summary').innerText = res.summary;

    // 7维度蜘蛛图数据生成
    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['理想', '情感', '混沌', '出世', '思辨', '神性', '过去'],
            datasets: [{
                data: [
                    dim.X * 20, dim.Y * 20, dim.Z * 20, dim.W * 20, 
                    Math.random()*40 + 50, Math.random()*30 + 40, Math.random()*50 + 30
                ],
                backgroundColor: 'rgba(166, 124, 82, 0.2)',
                borderColor: 'var(--accent-gold)',
                pointRadius: 0
            }]
        },
        options: {
            plugins: { legend: { display: false } }, // 去掉图例框
            scales: {
                r: {
                    min: 0, max: 100,
                    ticks: { display: false },
                    grid: { color: 'rgba(166, 124, 82, 0.1)' }
                }
            }
        }
    });
}
</script>
</body>
